name: 'Build OmniBox'

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install

      # --- macOS Signing (self-signed for testing) ---
      - name: Setup macOS certificate
        if: matrix.platform == 'macos-latest'
        run: |
          echo "${{ secrets.APPLE_CERTIFICATE }}" | base64 -d > /tmp/macos.p12
          security create-keychain -p "omnibox" /tmp/omnibox.keychain
          security unlock-keychain -p "omnibox" /tmp/omnibox.keychain
          security import /tmp/macos.p12 -k /tmp/omnibox.keychain -P "omnibox" -T /usr/bin/codesign
          security set-keychain-settings -t 3600 -u /tmp/omnibox.keychain
          security list-keychains -s /tmp/omnibox.keychain
          security default-keychain -s /tmp/omnibox.keychain

      # --- Windows Signing (self-signed for testing) ---
      - name: Setup Windows certificate
        if: matrix.platform == 'windows-latest'
        run: |
          $certBytes = [Convert]::FromBase64String("${{ secrets.WINDOWS_CERTIFICATE }}")
          [IO.File]::WriteAllBytes("D:\\omnibox.pfx", $certBytes)

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: /tmp/macos.p12
          APPLE_CERTIFICATE_PASSWORD: omnibox
          APPLE_SIGNING_IDENTITY: 'OmniBox'
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: omnibox
        with:
          tagName: v__VERSION__
          releaseName: 'OmniBox v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
